name: OSHFacilitiesIllustrated
options:
  bundleIdPrefix: com.taiwanarch
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hant
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "7H7ZUG2WX8"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"

targets:
  TaiwanBuildingCode:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TaiwanBuildingCode/App
      - path: TaiwanBuildingCode/Models
      - path: TaiwanBuildingCode/Services
      - path: TaiwanBuildingCode/Views
      - path: TaiwanBuildingCode/Resources/data/articles.json
        buildPhase: resources
      - path: TaiwanBuildingCode/Resources/images
        type: group
        buildPhase: resources
      - path: TaiwanBuildingCode/Resources/Assets.xcassets
        buildPhase: resources
      - path: TaiwanBuildingCode/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: TaiwanBuildingCode/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_TW
        CFBundleDisplayName: 職業安全衛生設施規則全圖解
        CFBundleName: 職業安全衛生設施規則全圖解
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "2"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchScreenBG
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taiwanarch.oshfacilities.illustrated
        TARGETED_DEVICE_FAMILY: "1,2"   # 1=iPhone 2=iPad
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - TaiwanBuildingCodeUnitTests
        - TaiwanBuildingCodeUITests

  TaiwanBuildingCodeUnitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/UnitTests
    dependencies:
      - target: TaiwanBuildingCode
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taiwanarch.oshfacilities.illustrated.tests
        GENERATE_INFOPLIST_FILE: "YES"

  TaiwanBuildingCodeUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/UITests
    dependencies:
      - target: TaiwanBuildingCode
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taiwanarch.oshfacilities.illustrated.uitests
        TEST_TARGET_NAME: TaiwanBuildingCode
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  TaiwanBuildingCode:
    build:
      targets:
        TaiwanBuildingCode: all
    run:
      config: Debug
      storeKitConfiguration: TaiwanBuildingCode/Resources/Configuration.storekit
    test:
      config: Debug
      targets:
        - TaiwanBuildingCodeUnitTests
        - TaiwanBuildingCodeUITests
    archive:
      config: Release
